<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具借用系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .action-btn { height: 60px; font-size: 1.2rem; font-weight: bold; }
        #reader { width: 100%; background: #000; border-radius: 8px; overflow: hidden; }
        /* 讀取中遮罩 */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); color: white; z-index: 9999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 500px;">
    <h3 class="text-center mb-4 font-weight-bold text-primary">🛠️ 工具借用系統</h3>

    <div class="row g-2 mb-4">
        <div class="col-6">
            <input type="radio" class="btn-check" name="action" id="btnCheckOut" value="借出" checked autocomplete="off">
            <label class="btn btn-outline-danger w-100 action-btn d-flex align-items-center justify-content-center" for="btnCheckOut">進入【借出】</label>
        </div>
        <div class="col-6">
            <input type="radio" class="btn-check" name="action" id="btnCheckIn" value="歸還" autocomplete="off">
            <label class="btn btn-outline-success w-100 action-btn d-flex align-items-center justify-content-center" for="btnCheckIn">進入【歸還】</label>
        </div>
    </div>

    <div class="card mb-4 shadow-sm" id="userSection">
        <div class="card-body">
            <label for="userId" class="form-label font-weight-bold">👤 員工工號</label>
            <input type="text" class="form-control form-control-lg" id="userId" placeholder="請輸入工號 (如: EMP-001)">
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body text-center">
            <h5 class="card-title text-start mb-3">📷 掃描工具 QR Code</h5>
            <div id="reader" class="mb-3"></div>
            <div class="d-flex justify-content-between">
                <button class="btn btn-secondary" onclick="startScanner()">開啟相機</button>
                <button class="btn btn-warning" onclick="stopScanner()">關閉相機</button>
            </div>
            <div id="scanResult" class="mt-3 alert alert-secondary d-none"></div>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <label for="remark" class="form-label">📝 狀況回報 / 備註 (選填)</label>
            <input type="text" class="form-control" id="remark" placeholder="若工具異常請在此註明">
        </div>
    </div>
</div>

<div id="loadingOverlay" class="d-none">
    <div class="spinner-border text-light mb-3" role="status"></div>
    <h5 id="loadingText">資料傳輸中，請稍候...</h5>
</div>

<script>
    // ⚠️ 請在此處貼上你從 Google Apps Script 複製的網頁應用程式網址
    const GAS_WEB_APP_URL = "你的_GAS_部署網址";

    let html5QrcodeScanner = null;

    // 開啟相機掃描
    function startScanner() {
        const scanResultDiv = document.getElementById('scanResult');
        scanResultDiv.classList.add('d-none');

        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
            { facingMode: "environment" }, // 優先使用後鏡頭
            {
                fps: 10,    // 每秒解碼幾次
                qrbox: { width: 250, height: 250 } // 掃描框大小
            },
            (decodedText, decodedResult) => {
                // 成功掃描到 QR Code 碼的內容
                stopScanner();
                scanResultDiv.innerText = `已辨識工具編號: ${decodedText}`;
                scanResultDiv.classList.remove('d-none');
                
                // 自動發送資料給後端
                sendDataToGAS(decodedText);
            },
            (errorMessage) => {
                // 這裡會持續輸出沒對準時的錯誤，通常不處理
            }
        ).catch((err) => {
            alert("無法開啟相機，請確認是否允許相機權限。");
            console.error(err);
        });
    }

    // 關閉相機
    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner = null;
            }).catch((err) => {
                console.error("停止相機失敗", err);
            });
        }
    }

    // 傳送資料到 Google Sheets (GAS)
    function sendDataToGAS(toolId) {
        const action = document.querySelector('input[name="action"]:checked').value;
        const userId = document.getElementById('userId').value.trim();
        const remark = document.getElementById('remark').value.trim();

        // 借出防呆：借出時必須輸入工號
        if (action === "借出" && !userId) {
            alert("請先輸入您的員工工號再進行掃描！");
            return;
        }

        // 顯示傳輸中遮罩，防止重複點擊或斷線重複送出
        showLoading(true, `正在辦理【${action}】中...`);

        const payload = {
            action: action,
            tool_id: toolId,
            user_id: userId,
            remark: remark
        };

        // 使用 fetch API 發送 POST 請求給 GAS
        fetch(GAS_WEB_APP_URL, {
            method: "POST",
            mode: "cors",
            headers: {
                "Content-Type": "text/plain" // GAS 接收 JSON 時，建議用 text/plain 以免觸發不必要的 Preflight 阻擋
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            showLoading(false);
            if (data.success) {
                alert("🎉 " + data.message);
                // 成功後清空輸入欄位與備註
                document.getElementById('remark').value = "";
                document.getElementById('scanResult').classList.add('d-none');
            } else {
                alert("❌ 失敗: " + data.message);
            }
        })
        .catch(error => {
            showLoading(false);
            alert("⚠️ 網路連線異常，請移動到訊號較佳的地方重試！");
            console.error("Error:", error);
        });
    }

    function showLoading(show, text = "") {
        const overlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        if (show) {
            loadingText.innerText = text;
            overlay.classList.remove('d-none');
        } else {
            overlay.classList.add('d-none');
        }
    }

    // 監聽動作切換，如果選歸還，工號可以選填（因為後端會自動辨識原本是誰借的）
    document.getElementsByName('action').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const userIdLabel = document.querySelector('label[for="userId"]');
            if (e.target.value === "歸還") {
                userIdLabel.innerText = "👤 員工工號 (選填，系統會自動抓取借用人)";
            } else {
                userIdLabel.innerText = "👤 員工工號";
            }
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
