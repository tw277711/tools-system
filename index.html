<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具借用系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        .action-btn { height: 60px; font-size: 1.2rem; font-weight: bold; }
        #reader { width: 100%; background: #000; border-radius: 8px; overflow: hidden; }
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); color: white; z-index: 9999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }
        .preview-img { max-width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 500px;">
    <h3 class="text-center mb-4 font-weight-bold text-primary">🛠️ 工具借用系統</h3>

    <div class="row g-2 mb-4">
        <div class="col-6">
            <input type="radio" class="btn-check" name="action" id="btnCheckOut" value="借出" checked autocomplete="off">
            <label class="btn btn-outline-danger w-100 action-btn d-flex align-items-center justify-content-center" for="btnCheckOut">進入【借出】</label>
        </div>
        <div class="col-6">
            <input type="radio" class="btn-check" name="action" id="btnCheckIn" value="歸還" autocomplete="off">
            <label class="btn btn-outline-success w-100 action-btn d-flex align-items-center justify-content-center" for="btnCheckIn">進入【歸還】</label>
        </div>
    </div>

    <div class="card mb-4 shadow-sm" id="userSection">
        <div class="card-body">
            <label for="userId" class="form-label font-weight-bold" id="userLabel">👤 選擇借用人</label>
            <select class="form-select form-select-lg" id="userId">
                <option value="">載入員工清單中...</option>
            </select>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body text-center">
            <h5 class="card-title text-start mb-3">📷 掃描工具 QR Code</h5>
            <div id="reader" class="mb-3"></div>
            <div class="d-flex justify-content-between">
                <button class="btn btn-secondary" onclick="startScanner()">開啟相機</button>
                <button class="btn btn-warning" onclick="stopScanner()">關閉相機</button>
            </div>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <label for="remark" class="form-label">📝 狀況回報 / 備註 (選填)</label>
            <input type="text" class="form-control" id="remark" placeholder="若工具異常請在此註明">
        </div>
    </div>
</div>

<div class="modal fade" id="confirmModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title font-weight-bold text-dark" id="confirmModalLabel">👀 請確認工具照片與資訊</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="startScanner()"></button>
      </div>
      <div class="modal-body text-center">
        <img id="modalToolImg" src="" class="preview-img mb-3 shadow-sm" alt="工具照片">
        <h4 id="modalToolName" class="font-weight-bold text-primary"></h4>
        <p id="modalToolSpec" class="text-muted mb-1"></p>
        <p id="modalActionText" class="badge bg-secondary fs-6 mt-2"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" onclick="startScanner()">取消</button>
        <button type="button" class="btn btn-primary btn-lg" id="btnFinalSubmit">確認送出</button>
      </div>
    </div>
  </div>
</div>

<div id="loadingOverlay" class="d-none">
    <div class="spinner-border text-light mb-3" role="status"></div>
    <h5 id="loadingText">資料傳輸中，請稍候...</h5>
</div>

<script>
    // ⚠️ 請在此處貼上你從 Google Apps Script 複製的最新網頁應用程式網址
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby33Sv74ikqHLdZrM3Eh5oEnW-m7vm23T24WVeaZ8kbUFrWyx7mo0KhtUmGcxqKWIcY7g/exec";

    let html5QrcodeScanner = null;
    let currentScannedToolId = ""; // 暫存掃描到的工具ID
    let bootstrapModal = null;

    window.addEventListener('load', () => {
        bootstrapModal = new bootstrap.Modal(document.getElementById('confirmModal'));
        
        // 載入員工
        fetch(GAS_WEB_APP_URL)
        .then(response => response.json())
        .then(data => {
            const selectEl = document.getElementById('userId');
            selectEl.innerHTML = '<option value="">-- 請選擇員工 --</option>';
            if (data.success && data.users.length > 0) {
                data.users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.user_id;
                    option.text = `${user.user_name} (${user.user_id})`;
                    selectEl.appendChild(option);
                });
            } else {
                selectEl.innerHTML = '<option value="">無法載入員工，請檢查資料表</option>';
            }
        })
        .catch(err => {
            document.getElementById('userId').innerHTML = '<option value="">連線失敗，無法載入員工</option>';
        });
    });

    function startScanner() {
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText, decodedResult) => {
                stopScanner();
                // 掃描到之後，先去查詢工具資訊，而不是直接寫入
                checkToolInfo(decodedText);
            },
            (errorMessage) => {}
        ).catch((err) => {
            alert("無法開啟相機，請確認是否允許相機權限。");
        });
    }

    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => { html5QrcodeScanner = null; });
        }
    }

    // 新增：向後端查詢工具資訊與照片
    function checkToolInfo(toolId) {
        const action = document.querySelector('input[name="action"]:checked').value;
        const userId = document.getElementById('userId').value;

        if (action === "借出" && !userId) {
            alert("請先選擇借用人再進行掃描！");
            startScanner();
            return;
        }

        showLoading(true, "正在查詢工具資訊...");

        const payload = {
            action: "查詢工具",
            tool_id: toolId,
            user_id: userId,
            current_mode: action
        };

        fetch(GAS_WEB_APP_URL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            showLoading(false);
            if (data.success) {
                currentScannedToolId = toolId; // 紀錄工具ID
                
                // 渲染彈出視窗內容
                document.getElementById('modalToolImg').src = data.img_url;
                document.getElementById('modalToolName').innerText = data.tool_name;
                document.getElementById('modalToolSpec').innerText = `規格型號: ${data.spec}`;
                
                const actionBtn = document.getElementById('btnFinalSubmit');
                if(action === "借出") {
                    document.getElementById('modalActionText').className = "badge bg-danger fs-6 mt-2";
                    document.getElementById('modalActionText').innerText = "確認借出？";
                    actionBtn.className = "btn btn-danger btn-lg";
                } else {
                    document.getElementById('modalActionText').className = "badge bg-success fs-6 mt-2";
                    document.getElementById('modalActionText').innerText = "確認歸還？";
                    actionBtn.className = "btn btn-success btn-lg";
                }

                // 設定確認按鈕的點擊事件
                actionBtn.onclick = () => {
                    bootstrapModal.hide();
                    executeTransaction(action, toolId, userId);
                };

                // 秀出彈出視窗
                bootstrapModal.show();
            } else {
                alert("❌ 阻擋: " + data.message);
                startScanner(); // 重新開啟相機
            }
        })
        .catch(error => {
            showLoading(false);
            alert("⚠️ 連線錯誤: " + error.message);
            startScanner();
        });
    }

    // 真正執行【確認借出】或【確認歸還】
    function executeTransaction(action, toolId, userId) {
        const remark = document.getElementById('remark').value.trim();
        showLoading(true, `正在變更資料庫【${action}】中...`);

        const payload = {
            action: action === "借出" ? "確認借出" : "確認歸還",
            tool_id: toolId,
            user_id: userId,
            remark: remark
        };

        fetch(GAS_WEB_APP_URL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            showLoading(false);
            if (data.success) {
                alert("🎉 " + data.message);
                document.getElementById('remark').value = "";
            } else {
                alert("❌ 失敗: " + data.message);
            }
        })
        .catch(error => {
            showLoading(false);
            alert("⚠️ 系統連線發生錯誤: " + error.message);
        });
    }

    function showLoading(show, text = "") {
        const overlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        if (show) {
            loadingText.innerText = text;
            overlay.classList.remove('d-none');
        } else {
            overlay.classList.add('d-none');
        }
    }

    document.getElementsByName('action').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const userLabel = document.getElementById('userLabel');
            if (e.target.value === "歸還") {
                userLabel.innerText = "👤 選擇歸還人 (選填，系統會自動抓取借用人)";
            } else {
                userLabel.innerText = "👤 選擇借用人";
            }
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
